<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">
<title>Scan Report - WebVulnScan</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

  <div class="brand">
    <div class="logo"></div>
    <div>
      <h1>Scan Report</h1>
      <div class="subtitle">
        Target: {{ target }}
      </div>
    </div>
  </div>

  <div class="results">

    {% if results %}
    
      {% for i in results %}
      
      <div class="result-item">

        <span class="port">
          {{ i.port }}
        </span>

        <span class="service">
          {{ i.service }}
        </span>

        <span class="status {{ i.status }}">
          {{ i.status }}
        </span>

      </div>

      {% endfor %}

    {% else %}

      <p>No open ports detected.</p>

    {% endif %}

  </div>

  <div class="footer">
    <a href="/">← Back</a>
  </div>

</div>

</body>
</html>
