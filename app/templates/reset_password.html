<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – ASTRA-X</title>
  <link rel="icon" href="{{ url_for('static', filename='astra-x-logo.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="page-shell auth-narrow-shell">
  <section class="shell-card">
    <div class="window-bar">
      <span class="window-dot r"></span>
      <span class="window-dot y"></span>
      <span class="window-dot g"></span>
      <span class="window-title">ASTRA-X</span>
    </div>
    <div class="auth-card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>ASTRA-X</h1>
          <p class="subtitle">Enter new password</p>
        </div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <p style="font-size:13px; color:#aaa; margin-bottom:16px;">
        Paste the reset code from your email, then choose a new password.
      </p>
      <form action="{{ url_for('auth.reset_password') }}" method="POST" class="form-stack">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="field-row">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com"
                 value="{{ form_data.email if form_data else '' }}" required>
        </div>
        <div class="field-row">
          <label>Reset Code</label>
          <input type="text" name="code" placeholder="123456"
                 value="{{ form_data.code if form_data else '' }}"
                 maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" required
                 style="letter-spacing:8px; font-size:22px; text-align:center;">
        </div>
        <div class="field-row">
          <label>New Password</label>
          <input type="password" name="password" placeholder="••••••••"
                 minlength="6" required>
        </div>
        <div class="field-row">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="••••••••"
                 minlength="6" required>
        </div>
        <button type="submit">Reset Password</button>
      </form>
      <form action="{{ url_for('auth.resend_reset_code') }}" method="POST" class="form-stack">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="email" value="{{ form_data.email if form_data else '' }}">
        <button type="submit">Resend Reset Code</button>
      </form>
      <div class="footer">
        <a href="{{ url_for('auth.forgot_password') }}">Need a first code?</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('auth.login') }}">Back to Login</a>
      </div>
    </div>
  </section>
</div>
</body>
</html>
