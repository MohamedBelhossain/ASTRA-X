<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – WebVulnScan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="page-shell" style="max-width:520px">
  <section class="shell-card">
    <div class="window-bar">
      <span class="window-dot r"></span>
      <span class="window-dot y"></span>
      <span class="window-dot g"></span>
      <span class="window-title">WebVulnScan</span>
    </div>
    <div class="auth-card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>WebVulnScan</h1>
          <p class="subtitle">Enter new password</p>
        </div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <form action="/reset-password" method="POST" class="form-stack">
        <div class="field-row">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field-row">
          <label>Reset Code</label>
          <input type="text" name="code" placeholder="123456"
                 maxlength="6" autocomplete="off" required
                 style="letter-spacing:8px; font-size:22px; text-align:center;">
        </div>
        <div class="field-row">
          <label>New Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="field-row">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" placeholder="••••••••" required>
        </div>
        <button type="submit">Reset Password</button>
      </form>
      <div class="footer"><a href="/login">← Back to Login</a></div>
    </div>
  </section>
</div>
</body>
</html>
