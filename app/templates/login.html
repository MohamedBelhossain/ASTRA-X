<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – WebVulnScan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="page-shell auth-narrow-shell">
  <section class="shell-card">
    <div class="window-bar">
      <span class="window-dot r"></span>
      <span class="window-dot y"></span>
      <span class="window-dot g"></span>
      <span class="window-title">WebVulnScan</span>
    </div>
    <div class="auth-card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>WebVulnScan</h1>
          <p class="subtitle">Sign in to your account</p>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form action="{{ url_for('auth.login') }}" method="POST" class="form-stack">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="field-row">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="field-row">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Login</button>
      </form>
      <div class="footer">
        <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a> &nbsp;·&nbsp;
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
      </div>
    </div>
  </section>
</div>
</body>
</html>
