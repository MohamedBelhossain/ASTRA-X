<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – WebVulnScan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
<div class="page-shell auth-narrow-shell">
  <section class="shell-card">
    <div class="window-bar">
      <span class="window-dot r"></span>
      <span class="window-dot y"></span>
      <span class="window-dot g"></span>
      <span class="window-title">WebVulnScan</span>
    </div>
    <div class="auth-card">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>WebVulnScan</h1>
          <p class="subtitle">Reset your password</p>
        </div>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      <p style="font-size:13px; color:#aaa; margin-bottom:16px;">
        Enter your email and we'll send you a reset code.
      </p>
      <form action="{{ url_for('auth.forgot_password') }}" method="POST" class="form-stack">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="field-row">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com"
                 value="{{ email_value }}" required>
        </div>
        <button type="submit">Send Reset Code</button>
      </form>
      <div class="footer"><a href="{{ url_for('auth.login') }}">← Back to Login</a></div>
    </div>
  </section>
</div>
</body>
</html>
