version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: "mongodb://mongo:27017/webvuln"
      SECRET_KEY: "CHANGE-THIS-IN-PRODUCTION"
    depends_on:
      - mongo

volumes:
  mongo_data:
