services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      MONGO_URI: "${DOCKER_MONGO_URI:-mongodb://mongo:27017/webvuln}"
      SECRET_KEY: "${SECRET_KEY:-CHANGE-THIS-IN-PRODUCTION}"
      MAIL_SERVER: "${MAIL_SERVER:-smtp.gmail.com}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USE_TLS: "${MAIL_USE_TLS:-true}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_DEFAULT_SENDER: "${MAIL_DEFAULT_SENDER:-}"
      MAIL_CONSOLE_FALLBACK: "${MAIL_CONSOLE_FALLBACK:-true}"
      SCAN_RATE_LIMIT_MAX: "${SCAN_RATE_LIMIT_MAX:-5}"
      SCAN_RATE_LIMIT_WINDOW_SECONDS: "${SCAN_RATE_LIMIT_WINDOW_SECONDS:-3600}"
      MAX_ACTIVE_SCANS_PER_USER: "${MAX_ACTIVE_SCANS_PER_USER:-1}"
    depends_on:
      - mongo

volumes:
  mongo_data:
